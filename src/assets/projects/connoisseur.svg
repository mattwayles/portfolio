<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'JetBrains Mono',monospace">
  <rect width="640" height="400" fill="#0b1120"/>
  <g fill="none" stroke="rgba(148,163,184,0.12)">
    <path d="M0 100h640M0 200h640M0 300h640M160 0v400M320 0v400M480 0v400"/>
  </g>
  <!-- pipeline: ingest -> retrieve -> agents -> mcp -->
  <g stroke="rgba(129,140,248,0.6)" stroke-width="2" fill="none">
